# Render Blueprint — Infrastructure as Code
# Deploy this Next.js app for free on Render:
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: stellargas-calculator
    env: static
    buildCommand: cd level2/yellow-belt && bun install && bun run build
    staticPublishPath: out
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NEXT_PUBLIC_RPC_TESTNET
        value: https://soroban-testnet.stellar.org
      - key: NEXT_PUBLIC_RPC_MAINNET
        value: https://soroban.stellar.org
